[mod-name]
ups_saving_quality_ships=UPS Saving Quality Ships

[mod-description]
ups_saving_quality_ships="Get rid of computer performance and enjoy the ultimate technology!" —— Promethium Tech Pack Spaceship\n\nModify the logic of cargo interaction between a spaceship and the ground so as to simulate multiple identical spaceships operating at the same time.\nThe higher the quality of the space platform hub, the higher the simulation multiplier of the airship.\nThis mod allows you to drastically reduce the number of physical spaceships in order to increase the ups.

[mod-setting-name]

[mod-setting-description]

[hub_quality_change]
hub_quality_1_2=space platform hub quality: normal -> uncommon
hub_quality_2_3=space platform hub quality: uncommon -> rare
hub_quality_3_4=space platform hub quality: rare -> epic
hub_quality_4_5=space platform hub quality: epic -> legendary
hub_quality_5_1=space platform hub quality: legendary -> normal
tip_handing_blueprint=Please click this icon while holding the blueprint/blueprint book!
tip_invalid_for_read_write=No modifiable space platform hubs detected.\nIf you are sure that the space platform hub is already contained within the blueprint/blueprint book, it means that it is not readable or writable.\nAttention please, a record is invalid for write if it is a BlueprintRecord preview or if it is in the "My blueprints" shelf.\nIn this case, you need to move it to your inventory or "Public blueprints" before performing this action.

[controls]
change-hub-quality=Change hub quality

[controls-description]
change-hub-quality=While holding a blueprint or blueprint book, click this icon or use hotkey (Ctrl+Alt+S) to change the quality of the Space Platform Hub in the blueprint. Not yet Legendary raises the quality, Legendary lowers it to the base quality.
