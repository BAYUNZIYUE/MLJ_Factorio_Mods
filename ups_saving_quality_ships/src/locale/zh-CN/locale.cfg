[mod-name]
ups_saving_quality_ships=UPS友好型品质飞船

[mod-description]
ups_saving_quality_ships=“摆脱电脑性能，畅享终极科技！” —— 黑瓶飞船\n\n修改飞船与地面的货物交互逻辑，从而模拟多个相同的飞船同时运行的情形。\n太空平台枢纽品质越高，飞船的模拟倍率也就越高。\n这个MOD可以让你大幅减少实体飞船的数目，以达到提高ups的效果。

[mod-setting-name]

[mod-setting-description]

[hub_quality_change]
hub_quality_changed=太空平台枢纽品质：__1__ -> __2__
hub_quality_at_max=太空平台枢纽已经是最高品质：__1__
tip_handing_blueprint=请在手持蓝图/蓝图册的情况下点击该图标！
tip_invalid_for_read_write=未检测到可修改的太空平台枢纽。\n如果你确信蓝图/蓝图册内包含太空平台枢纽，说明它不可读或不可写。\n请注意，如果记录是蓝图预览或在“我的蓝图”中，则写入无效。\n在这种情况下，你需要将其移动到背包或“公共蓝图”，再执行此操作。

[controls]
change-hub-quality=更改枢纽品质

[controls-description]
change-hub-quality=手持蓝图或蓝图册时，点击该图标或使用快捷键（Ctrl+Alt+S），以提高蓝图中太空平台枢纽的品质。如果已经是当前可用的最高品质，则不会回到基础品质。
