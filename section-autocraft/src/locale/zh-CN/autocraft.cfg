[mod-name]
autocraft=自动手搓

[mod-description]
autocraft=根据匹配到的物流编组自动手搓当前玩家缺少的物品。你可以用扳手虚拟信号作为可配置前缀，选择编组名匹配模式，并通过右下角快捷按钮启用或禁用自动手搓。

[virtual-signal-name]
signal-autocraft-wrench=自动手搓扳手

[shortcut-name]
autocraft-toggle=切换自动手搓

[shortcut-description]
autocraft-toggle=启用或禁用当前玩家的全部自动手搓。关闭时会取消模组建立的手搓队列，并清空当前自动手搓状态。

[mod-setting-name]
autocraft-wrench-prefix=自动手搓前缀
autocraft-match-mode=自动手搓匹配模式
autocraft-sound-enabled=播放自动手搓完成音效
autocraft-crafting-speed-multiplier=手搓速度倍数
autocraft-existing-sections-enabled=原有编组使用自动手搓
autocraft-logistics-sound-enabled=播放自动手搓完成音效
autocraft-logistics-existing-sections-enabled=原有编组使用自动手搓

[mod-setting-description]
autocraft-wrench-prefix=用于匹配自动手搓编组的富文本前缀。默认值是扳手虚拟信号对应的富文本。
autocraft-match-mode=选择编组名与已配置前缀及当前玩家名的匹配方式。
autocraft-sound-enabled=当自动手搓排入队列的物品完成时，播放制作完成音效。
autocraft-crafting-speed-multiplier=手搓速度是原版速度的多少倍。1 为原版速度，2 为 2 倍速度，10 为 10 倍速度。
autocraft-existing-sections-enabled=保留旧设置键的翻译，避免已有界面缓存出现未知键。
autocraft-logistics-sound-enabled=当自动手搓排入队列的物品完成时，播放制作完成音效。
autocraft-logistics-existing-sections-enabled=启用后，除 `Autocraft-<玩家名>` 外，其他已激活的普通物流编组也会参与自动手搓计算。

[string-mod-setting]
autocraft-match-mode-full-match=全匹配
autocraft-match-mode-prefix=前缀
autocraft-match-mode-player-name=玩家名
autocraft-match-mode-prefix-player-name=前缀+玩家名

[string-mod-setting-description]
autocraft-match-mode-full-match=所有已启用的物流编组都具备自动手搓能力。
autocraft-match-mode-prefix=只有名字以已配置前缀开头的已启用物流编组具备自动手搓能力。
autocraft-match-mode-player-name=只有名字以当前玩家名开头的已启用物流编组具备自动手搓能力。
autocraft-match-mode-prefix-player-name=只有名字以“已配置前缀 + 当前玩家名”开头的已启用物流编组具备自动手搓能力。

[autocraft-message]
autocraft-toggle-status-enabled=启用手搓
autocraft-toggle-status-disabled=禁用手搓
autocraft-toggle-status-empty=当前没有匹配的手搓分组
autocraft-toggle-status-line=物品分组 __1__ __2__
autocraft-toggle-status-unnamed-group=[未命名分组]
