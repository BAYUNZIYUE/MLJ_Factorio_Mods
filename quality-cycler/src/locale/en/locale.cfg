[mod-name]
quality-cycler=Blueprint & Upgrade Planner Quality Cycler

[mod-description]
quality-cycler=Cycle qualities inside blueprints, blueprint books, and upgrade planners with the controls bound to quality up/down.

[mod-setting-name]
quality-cycler-ignore-list=Quality cycling ignore list

[mod-setting-description]
quality-cycler-ignore-list=Comma-separated prototype names that this mod should not change. Example: transport-belt,fast-inserter. Chinese commas are also accepted.

[quality-cycler]
read-only=This blueprint, blueprint book, or upgrade planner is read-only. Move it to your inventory or Public blueprints first.
no-quality-changed=No quality changed. The selected item may already be at the quality boundary.
