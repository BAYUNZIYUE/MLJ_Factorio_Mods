[mod-name]
quality-cycler=蓝图/绿图品质切换器

[mod-description]
quality-cycler=使用控制设置里绑定的品质上/下切换操作快速修改蓝图、蓝图册和绿图中的品质。

[mod-setting-name]
quality-cycler-ignore-list=品质切换屏蔽列表

[mod-setting-description]
quality-cycler-ignore-list=用逗号分隔不希望本模组修改的原型名。例如：transport-belt,fast-inserter。中文逗号也可以使用。

[quality-cycler]
not-upgrade-planner=请先手持绿图，或选中可写的绿图记录。
not-blueprint-or-upgrade-planner=请先手持蓝图、蓝图册或绿图，或选中可写的公共蓝图/绿图记录。
read-only=这个蓝图、蓝图册或绿图是只读的。请先把它移动到背包或公共蓝图。
no-quality-changed=没有品质被修改。当前对象可能已经到达品质边界。
changed=已更新 __1__ 条升级规划器规则。
changed-summary=已更新 __1__ 个蓝图建筑、__2__ 个蓝图物品、__3__ 条升级规划器规则。
