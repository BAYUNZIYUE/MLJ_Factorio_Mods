[mod-name]
autocraft=Autocraft

[mod-description]
autocraft=Automatically hand-craft missing items for the current player based on matching logistics sections. Use the wrench virtual signal as a configurable prefix, choose how section names are matched, and toggle autocrafting with the shortcut button.

[virtual-signal-name]
signal-autocraft-wrench=Autocraft wrench

[shortcut-name]
autocraft-toggle=Toggle autocraft

[shortcut-description]
autocraft-toggle=Enable or disable all automatic hand crafting for the current player. Turning it off cancels the module-owned crafting queue and clears active autocraft state.

[mod-setting-name]
autocraft-wrench-prefix=Autocraft prefix
autocraft-match-mode=Autocraft match mode
autocraft-sound-enabled=Play autocraft completion sound
autocraft-existing-sections-enabled=Existing sections use autocraft
autocraft-logistics-sound-enabled=Play autocraft completion sound
autocraft-logistics-existing-sections-enabled=Existing sections use autocraft

[mod-setting-description]
autocraft-wrench-prefix=Rich text inserted before section names when matching Autocraft sections. The default value is the wrench virtual signal rich text.
autocraft-match-mode=Select how section names are matched against the configured prefix and the current player name.
autocraft-sound-enabled=Play the crafting-finished sound when an item queued by Autocraft completes.
autocraft-existing-sections-enabled=Legacy setting key kept for compatibility with existing locale lookups.
autocraft-logistics-sound-enabled=Play the crafting-finished sound when an item queued by Autocraft completes.
autocraft-logistics-existing-sections-enabled=When enabled, active non-Autocraft logistics sections also participate in automatic hand crafting.

[string-mod-setting]
autocraft-match-mode-full-match=Full match
autocraft-match-mode-prefix=Prefix
autocraft-match-mode-player-name=Player name
autocraft-match-mode-prefix-player-name=Prefix + player name

[string-mod-setting-description]
autocraft-match-mode-full-match=Every enabled logistics section can autocraft.
autocraft-match-mode-prefix=Only enabled logistics sections whose names start with the configured prefix can autocraft.
autocraft-match-mode-player-name=Only enabled logistics sections whose names start with the current player name can autocraft.
autocraft-match-mode-prefix-player-name=Only enabled logistics sections whose names start with the configured prefix followed by the current player name can autocraft.
