[mod-name]
autocraft=Autocraft

[mod-description]
autocraft=Automatically hand-craft missing items for the current player based on the active `Autocraft-<player name>` logistics section. Optionally include other active logistics sections and subtract inventory, logistic network, and queued crafting counts before deciding what to craft.

[mod-setting-name]
autocraft-sound-enabled=Play autocraft completion sound
autocraft-existing-sections-enabled=Existing sections use autocraft

[mod-setting-description]
autocraft-sound-enabled=Play the crafting-finished sound when an item queued by Autocraft completes.
autocraft-existing-sections-enabled=When enabled, active non-Autocraft logistics sections also participate in automatic hand crafting.
