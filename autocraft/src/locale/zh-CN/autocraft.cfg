[mod-name]
autocraft=自动手搓

[mod-description]
autocraft=根据当前玩家已激活的 `Autocraft-<玩家名>` 物流编组，自动手搓缺少的物品。也可以按设置把其他已激活的普通物流编组一起纳入计算，并在决定是否手搓前扣除背包库存、当前物流网络库存以及已排队的手搓数量。

[mod-setting-name]
autocraft-sound-enabled=播放自动手搓完成音效
autocraft-existing-sections-enabled=原有编组使用自动手搓

[mod-setting-description]
autocraft-sound-enabled=当自动手搓排入队列的物品完成时，播放制作完成音效。
autocraft-existing-sections-enabled=启用后，除 `Autocraft-<玩家名>` 外，其他已激活的普通物流编组也会参与自动手搓计算。
