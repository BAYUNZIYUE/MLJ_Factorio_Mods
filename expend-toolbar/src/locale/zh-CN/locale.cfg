[mod-name]
expend-toolbar=扩展工具栏

[mod-description]
expend-toolbar=创建可移动的自定义物品栏，支持 10 个固定页面、实时库存数量和品质切换。

[mod-setting-name]
columns=工具栏列数
show-controls-in-the-tooltip=在物品提示中显示控制说明
show-vehicle-inventories-content=计入载具库存
show-logistic-networks-content=显示物流网络数量

[mod-setting-description]
columns=每个自定义栏页面的横向槽位数。行数会自动增加或收缩。
show-controls-in-the-tooltip=在物品提示中显示品质切换和其他控制说明。
show-vehicle-inventories-content=统计和拿取物品时计入当前载具库存。
show-logistic-networks-content=普通角色视图下在提示中显示附近物流网络；远程星球视图下把物流网络计入槽位数量。

[expend-toolbar]
rename-page-title=重命名分组
confirm-rename=确认重命名
cancel=取消
