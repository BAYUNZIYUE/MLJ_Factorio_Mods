[mod-name]
expend-toolbar=Expend Toolbar

[mod-description]
expend-toolbar=Create movable custom item bars with tabs, live inventory counts, and quality controls.

[mod-setting-name]
columns=Toolbar columns
show-controls-in-the-tooltip=Show controls in item tooltips
show-vehicle-inventories-content=Include vehicle inventories
show-logistic-networks-content=Show logistic network counts

[mod-setting-description]
columns=Horizontal slot count for each custom bar page. Rows expand and shrink automatically.
show-controls-in-the-tooltip=Show quality and utility control hints in item tooltips.
show-vehicle-inventories-content=Include the current vehicle inventory when counting and taking items.
show-logistic-networks-content=Show nearby logistic networks in personal-view tooltips and count logistic networks in remote planet view.
